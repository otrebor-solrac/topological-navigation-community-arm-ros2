<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Pose 2: q2=90°, q3=0°</text>

  <!-- LOWER SHANK -->
  <line x1="150" y1="500" x2="150.00000000000003" y2="220.0" stroke="#4a90e2" stroke-width="12" stroke-linecap="round"/>
  <text x="190" y="360" font-family="sans-serif" font-size="20" fill="#4a90e2" font-weight="bold">lower_shank_140</text>

  <!-- UPPER SHANK -->
  <line x1="270.0" y1="220.0" x2="-149.99999999999997" y2="220.0" stroke="#f5a623" stroke-width="18" stroke-linecap="round"/>
  <text x="-149.99999999999997" y="250.0" font-family="sans-serif" font-size="18" fill="#f5a623" font-weight="bold">upper_shank_140</text>
  
  <!-- ARM LEVER -->
  <line x1="150" y1="500" x2="270.0" y2="500.0" stroke="#417505" stroke-width="12" stroke-linecap="round"/>
  <text x="170.0" y="480.0" font-family="sans-serif" font-size="18" fill="#417505" font-weight="bold">arm_lever</text>
  
  <!-- PLEUEL -->
  <line x1="270.0" y1="500.0" x2="270.0" y2="220.0" stroke="#2980b9" stroke-width="6" stroke-dasharray="10,6" stroke-linecap="round"/>
  <text x="230.0" y="360.0" font-family="sans-serif" font-size="18" fill="#2980b9" font-weight="bold">pleuel_140</text>

  <!-- Puntos pivote -->
  <circle cx="150" cy="500" r="10" fill="#d0021b" />
  <circle cx="150.00000000000003" cy="220.0" r="8" fill="#333" />
  <circle cx="270.0" cy="500.0" r="8" fill="#333" />
  <circle cx="270.0" cy="220.0" r="10" fill="#9013fe" />
</svg>